<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Academy Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6C5CE7; --success: #00B894; --danger: #D63031;
            --warning: #FDCB6E; --bg: #F0F2F5;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95); padding: 2rem; border-radius: 30px;
            width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin: 20px; text-align: center; border: 5px solid white;
        }

        .hidden { display: none; }
        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 1.2rem; }
        
        button {
            padding: 15px 25px; font-family: 'Quicksand', sans-serif; font-weight: bold;
            border: none; border-radius: 20px; cursor: pointer;
            background: var(--primary); color: white; box-shadow: 0 5px 0px #4834D4;
            margin: 8px; transition: 0.2s; font-size: 1rem;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px 0px #4834D4; }

        /* --- Shape Designs --- */
        .shape-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .shape { cursor: pointer; transition: 0.3s; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        .shape:hover { transform: scale(1.1) rotate(5deg); }
        
        .s-circle { width: 70px; height: 70px; background: #ff7675; border-radius: 50%; }
        .s-square { width: 70px; height: 70px; background: #74b9ff; }
        .s-rectangle { width: 100px; height: 60px; background: #a29bfe; }
        .s-oval { width: 100px; height: 60px; background: #fd79a8; border-radius: 50px / 30px; }
        .s-triangle { width: 0; height: 0; border-left: 40px solid transparent; border-right: 40px solid transparent; border-bottom: 70px solid #55efc4; }
        .s-diamond { width: 60px; height: 60px; background: #ffeaa7; transform: rotate(45deg); }
        .s-pentagon { width: 70px; height: 70px; background: #fab1a0; clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }

        .animal-btn { font-size: 50px !important; padding: 10px !important; width: 100px; height: 100px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .correct-anim { animation: pulse 0.5s ease-in-out; }

        /* --- New Fruits Layout Styles --- */
        .fruit-card {
            display: inline-flex; flex-direction: column; align-items: center;
            margin: 10px; cursor: pointer; transition: transform 0.2s;
        }
        .fruit-card:hover { transform: scale(1.1); }
        .fruit-bubble {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; border: 5px solid white;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
        }
        .fruit-name { font-weight: bold; font-size: 1.1rem; margin-top: 5px; color: #2d3436; }

        /* --- Sound Button Style --- */
        .sound-repeat-btn {
            background: #ffeaa7; color: #d63031; box-shadow: 0 5px 0px #e1b12c;
            font-size: 1.1rem; padding: 10px 20px; border-radius: 50px; margin-bottom: 15px;
        }
        .sound-repeat-btn:active { box-shadow: 0 1px 0px #e1b12c; }
    </style>
</head>
<body>

    <h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">🌟 Kids Academy Pro 🌟</h1>

    <div id="menu" class="game-container">
        <div id="menu-stars" style="font-size: 30px; margin-bottom: 10px;">⭐</div>
        <p style="font-size: 1.2rem;">🏆 Best Score: <span id="high-score-val">0</span></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="startGame('math')">➕ Math</button>
            <button onclick="startGame('color')">🎨 Colors</button>
            <button onclick="startGame('count')">🔢 Counting</button>
            <button onclick="startGame('animal')">🦁 Animals</button>
            <button onclick="startGame('shape')">🔷 Shapes</button>
            <button onclick="startGame('memory')">🧠 Memory</button>
        </div>
    </div>

    <div id="game-board" class="game-container hidden">
        <div class="stats-bar">
            <span>❤️ <span id="lives">5</span></span>
            <span id="game-title">GAME</span>
            <span>⭐ <span id="score">0</span></span>
        </div>
        <h2 id="question" style="color: #2d3436; min-height: 60px;">Question?</h2>
        <div id="action-area"></div>
        <div id="feedback" style="height: 40px; margin: 15px; font-weight: bold; font-size: 1.5rem;"></div>
        <button style="background:#b2bec3; box-shadow:0 5px 0 #636e72" onclick="endGame()">Stop Playing</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundjay.com/free-music/sounds/barn-beat-01.mp3" type="audio/mpeg">
    </audio>

<script>
    let state = {
        score: 0, lives: 5, level: 1, 
        highScore: parseInt(localStorage.getItem('kidsHS')) || 0,
        currentGame: '', correctAnswer: null,
        currentAnimalSound: '' // Keeps track of sound string to repeat
    };

    let flipped = [];
    let isProcessing = false;

    function updateHUD() {
        document.getElementById('score').innerText = state.score;
        document.getElementById('lives').innerText = state.lives;
        document.getElementById('high-score-val').innerText = state.highScore;
        const s = state.score;
        document.getElementById('menu-stars').innerText = s > 100 ? "👑⭐⭐⭐⭐⭐" : s > 70 ? "⭐⭐⭐⭐⭐" : s > 40 ? "⭐⭐⭐⭐" : s > 20 ? "⭐⭐⭐" : "⭐";
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Stop current speech
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }
    }

    function startGame(type) {
        state.currentGame = type;
        state.score = 0; state.lives = 5; state.level = 1;
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-board').classList.remove('hidden');
        document.getElementById('game-title').innerText = type.toUpperCase();
        
        // Start Background Music
        const music = document.getElementById('bgMusic');
        music.volume = 0.2;
        music.play().catch(() => console.log("Music needs user interaction first"));

        updateHUD();
        nextQuestion();
    }

    function nextQuestion() {
        const area = document.getElementById('action-area');
        const q = document.getElementById('question');
        area.innerHTML = ''; document.getElementById('feedback').innerText = '';
        flipped = [];
        isProcessing = false;

        // --- ANIMAL GAME ---
        if (state.currentGame === 'animal') {
            const animals = [
                {n:'Lion', s:'Roar', e:'🦁'}, {n:'Chicken', s:'Bawk-bawk', e:'🐔'}, 
                {n:'Monkey', s:'Ooh ooh aah aah', e:'🐒'}, {n:'Sheep', s:'Baaa', e:'🐑'}, 
                {n:'Frog', s:'Ribbit', e:'🐸'}, {n:'Bee', s:'Buzzzz', e:'🐝'},
                {n:'Bird', s:'Tweet tweet', e:'🐦'}, {n:'Cat', s:'Meow', e:'🐱'},
                {n:'Duck', s:'Quack', e:'🦆'}, {n:'Pig', s:'Oink', e:'🐷'},
                {n:'Dog', s:'Woof', e:'🐶'}, {n:'Goat', s:'Maaa', e:'🐐'},
                {n:'Turkey', s:'Gobble gobble', e:'🦃'}
            ];
            let pick = animals[Math.floor(Math.random() * animals.length)];
            state.correctAnswer = pick;
            state.currentAnimalSound = pick.s;
            
            q.innerText = `Which animal makes this sound?`;
            speak(pick.s);
            
            area.innerHTML += `<button class="sound-repeat-btn" onclick="speak(state.currentAnimalSound)">🔊 Hear Sound Again</button><br>`;
            
            let choices = [...animals].sort(() => 0.5 - Math.random()).slice(0, 4);
            if (!choices.find(a => a.n === pick.n)) choices[0] = pick;
            
            let buttonsContainer = `<div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">`;
            choices.sort(() => 0.5 - Math.random()).forEach(a => {
                buttonsContainer += `<button class="animal-btn" style="background: #ffffff; border: 4px solid var(--primary); border-radius: 25px; box-shadow: 0 6px 0 #4834D4; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'" onclick="handleAnimalResult('${a.n}'==='${pick.n}')">${a.e}</button>`;
            });
            buttonsContainer += `</div>`;
            area.innerHTML += buttonsContainer;
        }

        // --- FRUIT COLOR GAME ---
        else if (state.currentGame === 'color') {
            const fruits = [
                {n:'Apple', v:'#ff4d4d', e:'🍎', c:'Red'}, 
                {n:'Blueberries', v:'#2e86de', e:'🫐', c:'Blue'}, 
                {n:'Watermelon', v:'#2ecc71', e:'🍉', c:'Green'}, 
                {n:'Banana', v:'#f1c40f', e:'🍌', c:'Yellow'}, 
                {n:'Peach', v:'#ff9ff3', e:'🍑', c:'Pink'}, 
                {n:'Orange', v:'#ff9f43', e:'🍊', c:'Orange'},
                {n:'Grapes', v:'#9b59b6', e:'🍇', c:'Purple'}
            ];
            let pick = fruits[Math.floor(Math.random()*fruits.length)];
            state.correctAnswer = pick.n;
            q.innerHTML = `Find the <span style="color:${pick.v}">${pick.c.toUpperCase()}</span> fruit!`;
            
            let choices = [...fruits].sort(() => 0.5 - Math.random()).slice(0,4);
            if (!choices.find(f => f.n === pick.n)) choices[0] = pick;

            choices.sort(() => 0.5 - Math.random()).forEach(f => {
                area.innerHTML += `
                    <div class="fruit-card" onclick="handleResult('${f.n}'==='${pick.n}')">
                        <div class="fruit-bubble" style="background:${f.v};">${f.e}</div>
                        <div class="fruit-name">${f.n}</div>
                    </div>`;
            });
        }

        // --- MEMORY GAME ---
        else if (state.currentGame === 'memory') {
            q.innerText = "Match the Pairs!";
            const pool = ['🐶','🍎','⭐','🤖','🐸','🎈','🍭','🦁'];
            const selectedIcons = pool.sort(() => 0.5 - Math.random()).slice(0, 4);
            const icons = [...selectedIcons, ...selectedIcons].sort(() => 0.5 - Math.random());
            
            let grid = `<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; max-width:400px; margin:auto;">`;
            icons.forEach((icon, i) => {
                grid += `<div id="c${i}" onclick="flip(${i},'${icon}')" style="background:var(--primary); height:80px; border-radius:15px; cursor:pointer; font-size:40px; display:flex; align-items:center; justify-content:center; color:transparent; transition: 0.3s; box-shadow: 0 4px 0 #4834D4;">${icon}</div>`;
            });
            area.innerHTML = grid + `</div>`;
        }

        // --- SHAPE GAME ---
        else if (state.currentGame === 'shape') {
            const shapes = [{n:'Circle', c:'s-circle'}, {n:'Square', c:'s-square'}, {n:'Triangle', c:'s-triangle'}, {n:'Diamond', c:'s-diamond'}, {n:'Rectangle', c:'s-rectangle'}, {n:'Oval', c:'s-oval'}, {n:'Pentagon', c:'s-pentagon'}];
            let pick = shapes[Math.floor(Math.random() * shapes.length)];
            state.correctAnswer = pick.n;
            q.innerText = `Can you find the ${pick.n.toUpperCase()}?`;
            let choices = [...shapes].sort(() => 0.5 - Math.random()).slice(0, 4);
            if (!choices.find(s => s.n === pick.n)) choices[0] = pick;
            let html = `<div class="shape-container">`;
            choices.sort(() => 0.5 - Math.random()).forEach(s => { html += `<div class="shape ${s.c}" onclick="handleResult('${s.n}'==='${pick.n}')"></div>`; });
            area.innerHTML = html + `</div>`;
        }
        
        // --- MATH GAME (With Added Speech Synthesis) ---
        else if (state.currentGame === 'math') {
            let n1 = Math.floor(Math.random() * (state.level * 5)) + 1;
            let n2 = Math.floor(Math.random() * (state.level * 5)) + 1;
            
            let isAddition = Math.random() > 0.5;

            if (isAddition) {
                state.correctAnswer = n1 + n2;
                q.innerText = `${n1} + ${n2} = ?`;
                speak(`${n1} plus ${n2}`); // Speaks the addition question aloud
            } else {
                if (n2 > n1) {
                    let temp = n1;
                    n1 = n2;
                    n2 = temp;
                }
                state.correctAnswer = n1 - n2;
                q.innerText = `${n1} - ${n2} = ?`;
                speak(`${n1} minus ${n2}`); // Speaks the subtraction question aloud
            }

            area.innerHTML = `<input type="number" id="math-ans" style="width:100px; padding:15px; font-size:24px; border-radius:15px; border:3px solid #ddd; outline:none;"><br><button onclick="checkMath()">Check!</button>`;
            
            setTimeout(() => {
                let input = document.getElementById('math-ans');
                if(input) input.focus();
            }, 10);
        }
        
        // --- COUNTING GAME ---
        else if (state.currentGame === 'count') {
            let num = Math.floor(Math.random() * 9) + 1;
            state.correctAnswer = num;
            q.innerText = "How many candies do you see?";
            let items = ""; for(let i=0; i<num; i++) items += "🍭";
            area.innerHTML = `<div style="font-size:50px; margin:20px;">${items}</div>`;
            for(let i=1; i<=10; i++) area.innerHTML += `<button onclick="handleResult(${i}===${num})">${i}</button>`;
        }
    }

    function flip(i, icon) {
        if (isProcessing) return;
        let el = document.getElementById('c'+i);
        if (el.style.color === 'white') return;

        el.style.color = 'white'; 
        el.style.background = 'white'; 
        el.style.border = '3px solid var(--primary)';
        
        flipped.push({i, icon});

        if (flipped.length === 2) {
            isProcessing = true;
            if (flipped[0].icon === flipped[1].icon) {
                state.score += 10;
                updateHUD();
                document.getElementById('feedback').innerHTML = "✨ Match! ✨";
                flipped = [];
                isProcessing = false;
                
                const all = document.querySelectorAll('[id^="c"]');
                const matched = Array.from(all).filter(card => card.style.color === 'white');
                if (matched.length === all.length) {
                    setTimeout(nextQuestion, 1500);
                }
            } else {
                setTimeout(() => {
                    flipped.forEach(f => {
                        let card = document.getElementById('c'+f.i);
                        card.style.color = 'transparent'; 
                        card.style.background = 'var(--primary)';
                        card.style.border = 'none';
                    });
                    flipped = [];
                    isProcessing = false;
                }, 800);
            }
        }
    }

    function checkMath() {
        let val = parseInt(document.getElementById('math-ans').value);
        if (isNaN(val)) return; 
        handleResult(val === state.correctAnswer);
    }

    function handleAnimalResult(isCorrect) {
        const fb = document.getElementById('feedback');
        const area = document.getElementById('action-area');
        
        if (isCorrect) {
            fb.innerHTML = "<span style='color:var(--success)'>✨ Great Job! ✨</span>";
            state.score += 5;
            document.getElementById('game-board').classList.add('correct-anim');
            setTimeout(() => document.getElementById('game-board').classList.remove('correct-anim'), 500);
            
            area.innerHTML = `
                <div style="margin: 20px auto; padding: 20px; background: #fff; border-radius: 20px; border: 4px dashed var(--success); max-width: 200px; box-shadow: 0 10px 20px rgba(0,0,0,0.05);">
                    <div style="font-size: 80px; line-height: 1;">${state.correctAnswer.e}</div>
                    <div style="font-size: 1.8rem; font-weight: bold; color: #2d3436; margin-top: 10px;">${state.correctAnswer.n}</div>
                </div>
            `;
            speak(state.correctAnswer.n);
            setTimeout(nextQuestion, 2500);
        } else {
            fb.innerHTML = "<span style='color:var(--danger)'>Oops! Try again!</span>";
            state.lives--;
            if (state.lives <= 0) endGame();
            else setTimeout(nextQuestion, 1500);
        }
        updateHUD();
    }

    function handleResult(isCorrect) {
        const fb = document.getElementById('feedback');
        if(isCorrect) {
            fb.innerHTML = "<span style='color:var(--success)'>✨ Great Job! ✨</span>";
            state.score += 5;
            document.getElementById('game-board').classList.add('correct-anim');
            setTimeout(() => document.getElementById('game-board').classList.remove('correct-anim'), 500);
            setTimeout(nextQuestion, 1500);
        } else {
            fb.innerHTML = "<span style='color:var(--danger)'>Oops! Try again!</span>";
            state.lives--;
            if(state.lives <= 0) endGame();
            else setTimeout(nextQuestion, 1500);
        }
        updateHUD();
    }

    function endGame() {
        const music = document.getElementById('bgMusic');
        music.pause();
        music.currentTime = 0;

        if(state.score > state.highScore) {
            state.highScore = state.score;
            localStorage.setItem('kidsHS', state.score);
        }
        alert("Wonderful! Your score: " + state.score);
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game-board').classList.add('hidden');
        updateHUD();
    }

    updateHUD();
</script>
</body>
</html>
